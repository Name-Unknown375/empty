<div class="adelie-section">

    <div id="adelie-checkout" orgId="LvrymFxex6oslWCxcrEg">
      <div id="checkout-loading" style="text-align:center;padding:64px 0;color:var(--muted);font-size:14px">
        Loading checkout…
      </div>
    </div>
  </div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const loading = document.getElementById('checkout-loading');
    if (loading) {
      const observer = new MutationObserver(() => {
        if (document.getElementById('adelie-checkout').childElementCount > 1) {
          loading.remove();
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('adelie-checkout'), { childList: true });
    }
  });
</script>
<div class="trust-bar">
